name: Refresh Remote Catalog

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-remote-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install 7-Zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Refresh catalog
        env:
          CATALOG_BASE_URI: ${{ secrets.CATALOG_BASE_URI }}
          CATALOG_PASSWORD_B64: ${{ secrets.CATALOG_PASSWORD_B64 }}
        run: node scripts/refresh-remote-catalog.mjs

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- public/remote-catalog.json; then
            echo "No catalog changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/remote-catalog.json
          git commit -m "chore: refresh remote catalog"
          git push
